name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag to publish, for example v0.1.0"
        required: true
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Test lumi-tester
        run: cargo test --locked --manifest-path lumi-tester/Cargo.toml

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: lumi-tester-mcp/package-lock.json

      - name: Test lumi-tester-mcp
        working-directory: lumi-tester-mcp
        run: |
          npm ci
          npm test

      - name: Validate install script syntax
        run: |
          bash -n lumi-tester/scripts/install.sh
          bash -n lumi-tester/scripts/install-ai.sh
          python3 lumi-tester/scripts/check-ai-reference.py

      - name: Validate Windows install script syntax
        shell: pwsh
        run: |
          foreach ($script in @("lumi-tester/scripts/install.ps1", "lumi-tester/scripts/install-ai.ps1")) {
            $errors = $null
            [System.Management.Automation.PSParser]::Tokenize((Get-Content $script -Raw), [ref]$errors) | Out-Null
            if ($errors) {
              $errors | Format-List | Out-String | Write-Error
              exit 1
            }
          }

  build:
    name: Build ${{ matrix.target }}
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_name: lumi-tester-x86_64-unknown-linux-gnu
            mcp_asset_name: lumi-tester-mcp-x86_64-unknown-linux-gnu.tgz
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            asset_name: lumi-tester-aarch64-unknown-linux-gnu
            mcp_asset_name: lumi-tester-mcp-aarch64-unknown-linux-gnu.tgz
          - os: macos-latest
            target: x86_64-apple-darwin
            asset_name: lumi-tester-x86_64-apple-darwin
            mcp_asset_name: lumi-tester-mcp-x86_64-apple-darwin.tgz
          - os: macos-latest
            target: aarch64-apple-darwin
            asset_name: lumi-tester-aarch64-apple-darwin
            mcp_asset_name: lumi-tester-mcp-aarch64-apple-darwin.tgz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_name: lumi-tester-x86_64-pc-windows-msvc.exe
            mcp_asset_name: lumi-tester-mcp-x86_64-pc-windows-msvc.tgz
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            asset_name: lumi-tester-aarch64-pc-windows-msvc.exe
            mcp_asset_name: lumi-tester-mcp-aarch64-pc-windows-msvc.tgz

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          target: ${{ matrix.target }}

      - name: Build lumi-tester
        run: cargo build --release --locked --target ${{ matrix.target }} --manifest-path lumi-tester/Cargo.toml

      - name: Prepare CLI asset
        shell: bash
        run: |
          mkdir -p dist
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            cp "lumi-tester/target/${{ matrix.target }}/release/lumi-tester.exe" "dist/${{ matrix.asset_name }}"
          else
            cp "lumi-tester/target/${{ matrix.target }}/release/lumi-tester" "dist/${{ matrix.asset_name }}"
            chmod +x "dist/${{ matrix.asset_name }}"
          fi

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: lumi-tester-mcp/package-lock.json

      - name: Pack self-contained MCP package
        shell: bash
        working-directory: lumi-tester-mcp
        run: |
          npm ci
          npm test
          npm run stage-binary -- "../dist/${{ matrix.asset_name }}"
          npm pack
          mv lumi-tester-mcp-*.tgz "../dist/${{ matrix.mcp_asset_name }}"

      - name: Upload CLI asset
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}

      - name: Upload MCP package
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.mcp_asset_name }}
          path: dist/${{ matrix.mcp_asset_name }}

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
    steps:
      - uses: actions/checkout@v6

      - name: Validate release tag
        shell: bash
        run: |
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+(\.[0-9]+){1,2}([-+][0-9A-Za-z.-]+)?$ ]]; then
            echo "Release tag must look like v0.1.0, got: $RELEASE_TAG" >&2
            exit 1
          fi

      - name: Download release artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-assets

      - name: Flatten artifacts
        shell: bash
        run: |
          mkdir -p dist
          find release-assets -type f -print0 | while IFS= read -r -d '' file; do
            cp "$file" "dist/$(basename "$file")"
          done
          cp lumi-tester/scripts/install.sh dist/install.sh
          cp lumi-tester/scripts/install.ps1 dist/install.ps1
          cp lumi-tester/scripts/install-ai.sh dist/install-ai.sh
          cp lumi-tester/scripts/install-ai.ps1 dist/install-ai.ps1
          ls -la dist

      - name: Generate checksums
        shell: bash
        run: |
          (cd dist && sha256sum * | sort > SHA256SUMS)
          cat dist/SHA256SUMS

      - name: Generate package manager manifests
        shell: bash
        run: |
          bash lumi-tester/scripts/generate-package-manifests.sh "$RELEASE_TAG" dist

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: dist/*
          fail_on_unmatched_files: true
