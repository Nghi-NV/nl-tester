name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Test lumi-tester
        run: cargo test --locked --manifest-path lumi-tester/Cargo.toml

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: lumi-tester-mcp/package-lock.json

      - name: Test lumi-tester-mcp
        working-directory: lumi-tester-mcp
        run: |
          npm ci
          npm test

      - name: Validate shell scripts
        run: |
          bash -n lumi-tester/scripts/install.sh
          bash -n lumi-tester/scripts/install-ai.sh
          bash -n lumi-tester/scripts/generate-package-manifests.sh
          bash -n lumi-tester/scripts/publish-package-manager-manifests.sh
          bash -n lumi-tester/scripts/check-package-manifests.sh

      - name: Validate AI references
        run: python3 lumi-tester/scripts/check-ai-reference.py

      - name: Validate package manifests
        run: bash lumi-tester/scripts/check-package-manifests.sh

      - name: Validate Windows install script
        shell: pwsh
        run: |
          foreach ($script in @(
            "lumi-tester/scripts/install.ps1",
            "lumi-tester/scripts/install-ai.ps1",
            "lumi-tester/scripts/run-windows-desktop-smoke.ps1"
          )) {
            $errors = $null
            [System.Management.Automation.PSParser]::Tokenize((Get-Content $script -Raw), [ref]$errors) | Out-Null
            if ($errors) {
              $errors | Format-List | Out-String | Write-Error
              exit 1
            }
          }
